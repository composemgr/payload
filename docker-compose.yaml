# nginx proxy address - http://172.17.0.1:3005

name: payload
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  payload:
    image: payloadcms/payload:latest
    pull_policy: always
    container_name: payload-app
    restart: always
    logging: *default-logging
    networks:
      - payload
    ports:
      - "172.17.0.1:3005:3000"
    environment:
      TZ: ${TZ:-America/New_York}
      DATABASE_URI: mongodb://${DB_ADMIN_USER:-root}:${DB_ADMIN_PASS:-changeme_admin_password}@payload-db:27017/${DB_CREATE_DATABASE_NAME:-payload}
      PAYLOAD_SECRET: ${APP_SECRET_KEY:-changeme_secret_key_min_32_chars}
    volumes:
      - ./volumes/data/payload:/home/node/app/media
    depends_on:
      - payload-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  payload-db:
    image: mongo:latest
    pull_policy: always
    container_name: payload-db
    restart: always
    logging: *default-logging
    networks:
      - payload
    environment:
      TZ: ${TZ:-America/New_York}
      MONGO_INITDB_DATABASE: ${DB_CREATE_DATABASE_NAME:-payload}
      MONGO_INITDB_ROOT_USERNAME: ${DB_ADMIN_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_ADMIN_PASS:-changeme_admin_password}
    volumes:
      - ./volumes/data/db/mongodb/payload:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  payload:
    external: false
